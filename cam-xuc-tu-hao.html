<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cảm xúc tự hào | 50 năm Học viện Quốc phòng</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#eef4f0;
      --surface:#ffffff;
      --deep:#1a3e3a;
      --text:#1e3a35;
      --muted:#557a72;
      --gold:#dba45a;
      --gold-2:#c28632;
      --line:rgba(26,62,58,0.08);
      --shadow-main:0 20px 46px rgba(18,32,28,0.06);
      --shadow-card:0 12px 28px rgba(26,62,58,0.06);
      --radius-xxl:34px;
      --radius-xl:26px;
      --radius-lg:20px;
    }
    body{
      font-family:'Inter',system-ui,sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.7;
    }
    a{text-decoration:none;color:inherit}
    .container{width:min(1240px, calc(100% - 36px));margin:0 auto}
    .page-hero{
      padding:34px 0 20px;
      background:linear-gradient(180deg, #eef4f0 0%, #f9fcfb 100%);
    }
    .hero-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:30px;
      box-shadow:var(--shadow-main);
      padding:28px;
    }
    .hero-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }
    .back-link{
      display:inline-flex;
      padding:10px 16px;
      border-radius:999px;
      background:#fff;
      border:1px solid rgba(26,62,58,0.1);
      font-weight:700;
      color:var(--deep);
    }
    .hero-card h1{
      font-size:clamp(2rem,4vw,3.1rem);
      line-height:1.12;
      color:var(--deep);
      font-weight:900;
      margin-bottom:10px;
    }
    .hero-card p{
      max-width:820px;
      color:var(--muted);
    }
    .article-page{
      padding:28px 0 80px;
    }
    .toolbar{
      display:grid;
      grid-template-columns:1.35fr .8fr .65fr;
      gap:14px;
      margin-bottom:26px;
    }
    .toolbar input,
    .toolbar select{
      width:100%;
      min-height:52px;
      border-radius:16px;
      border:1px solid rgba(26,62,58,0.12);
      background:#fff;
      padding:0 16px;
      font:inherit;
      color:var(--text);
      outline:none;
    }
    .article-grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:22px;
    }
    .article-card{
      overflow:hidden;
      background:#fff;
      border:1px solid rgba(26,62,58,0.08);
      border-radius:24px;
      box-shadow:var(--shadow-card);
      transition:.25s ease;
    }
    .article-card:hover{
      transform:translateY(-5px);
      box-shadow:0 18px 30px rgba(26,62,58,0.08);
    }
    .article-thumb{
      aspect-ratio:16/10;
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }
    .article-body{padding:18px}
    .article-badge{
      display:inline-flex;
      padding:7px 14px;
      border-radius:999px;
      background:rgba(219,164,90,0.14);
      color:#a36a20;
      font-size:.74rem;
      font-weight:800;
      letter-spacing:.8px;
      text-transform:uppercase;
      margin-bottom:12px;
    }
    .article-meta{
      font-size:.86rem;
      color:#7d8c87;
      margin-bottom:10px;
    }
    .article-card h3{
      font-size:1.04rem;
      color:var(--deep);
      line-height:1.4;
      font-weight:800;
      margin-bottom:10px;
      min-height:2.8em;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
    .article-card p{
      color:var(--muted);
      font-size:.93rem;
      line-height:1.72;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
      min-height:4.9em;
      margin-bottom:16px;
    }
    .btn-gold{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:0 18px;
      border-radius:999px;
      background:linear-gradient(135deg, var(--gold), var(--gold-2));
      color:#fff;
      font-weight:800;
      font-size:.92rem;
      box-shadow:0 12px 24px rgba(194,134,50,.22);
    }
    .empty-state{
      padding:30px 18px;
      text-align:center;
      color:var(--muted);
      background:#fff;
      border:1px dashed rgba(26,62,58,0.14);
      border-radius:22px;
    }
    .pagination{
      margin-top:30px;
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:10px;
    }
    .pagination button{
      min-width:44px;
      height:44px;
      border:none;
      border-radius:999px;
      padding:0 14px;
      font:inherit;
      font-weight:800;
      background:#fff;
      color:var(--deep);
      box-shadow:0 8px 18px rgba(26,62,58,0.08);
      cursor:pointer;
    }
    .pagination button.active{
      background:linear-gradient(135deg, var(--gold), var(--gold-2));
      color:#fff;
    }
    @media (max-width: 1100px){
      .article-grid{grid-template-columns:repeat(2,1fr)}
      .toolbar{grid-template-columns:1fr 1fr}
    }
    @media (max-width: 720px){
      .toolbar{grid-template-columns:1fr}
      .article-grid{grid-template-columns:1fr}
      .hero-card{padding:22px 18px}
    }
  </style>
</head>
<body>
  <header class="page-hero">
    <div class="container">
      <div class="hero-card">
        <div class="hero-top">
          <a href="index.html#bai-viet" class="back-link">← Quay lại trang chủ</a>
        </div>
        <h1>Cảm xúc tự hào</h1>
        <p>
          Danh sách những bài viết, cảm nhận, ký ức và chia sẻ về chặng đường
          50 năm xây dựng, trưởng thành của Học viện Quốc phòng.
        </p>
      </div>
    </div>
  </header>

  <main class="article-page">
    <div class="container">
      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Tìm theo tiêu đề, tác giả hoặc đơn vị...">
        <select id="categoryFilter">
          <option value="">Tất cả chủ đề</option>
        </select>
        <select id="sortFilter">
          <option value="newest">Mới nhất</option>
          <option value="oldest">Cũ nhất</option>
          <option value="featured">Ưu tiên bài nổi bật</option>
        </select>
      </div>

      <div class="article-grid" id="articleList"></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </main>

  <script src="assets/data/articles.js"></script>
  <script>
    const pageState = {
      all: Array.isArray(window.ARTICLE_DATA) ? [...window.ARTICLE_DATA] : [],
      filtered: [],
      currentPage: 1,
      perPage: 9
    };

    function formatVietnameseDate(dateString) {
      const d = new Date(dateString);
      if (Number.isNaN(d.getTime())) return dateString;
      return d.toLocaleDateString("vi-VN");
    }

    function getSortValue(items, sortType) {
      const data = [...items];
      if (sortType === "oldest") {
        return data.sort((a, b) => new Date(a.date) - new Date(b.date));
      }
      if (sortType === "featured") {
        return data.sort((a, b) => {
          if ((b.featured ? 1 : 0) !== (a.featured ? 1 : 0)) {
            return (b.featured ? 1 : 0) - (a.featured ? 1 : 0);
          }
          return new Date(b.date) - new Date(a.date);
        });
      }
      return data.sort((a, b) => new Date(b.date) - new Date(a.date));
    }

    function buildCategoryOptions() {
      const select = document.getElementById("categoryFilter");
      const categories = [...new Set(pageState.all.map(item => item.category).filter(Boolean))];
      select.innerHTML = `<option value="">Tất cả chủ đề</option>` +
        categories.map(cat => `<option value="${cat}">${cat}</option>`).join("");
    }

    function applyFilters() {
      const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
      const category = document.getElementById("categoryFilter").value;
      const sortType = document.getElementById("sortFilter").value;

      let result = pageState.all.filter(item => {
        const text = `${item.title} ${item.author} ${item.unit || ""}`.toLowerCase();
        const matchKeyword = !keyword || text.includes(keyword);
        const matchCategory = !category || item.category === category;
        return matchKeyword && matchCategory;
      });

      pageState.filtered = getSortValue(result, sortType);
      pageState.currentPage = 1;
      renderArticles();
      renderPagination();
    }

    function renderArticles() {
      const box = document.getElementById("articleList");
      const start = (pageState.currentPage - 1) * pageState.perPage;
      const end = start + pageState.perPage;
      const items = pageState.filtered.slice(start, end);

      if (!items.length) {
        box.innerHTML = `<div class="empty-state">Chưa tìm thấy bài viết phù hợp.</div>`;
        return;
      }

      box.innerHTML = items.map(item => `
        <article class="article-card">
          <div class="article-thumb" style="background-image:url('${item.thumbnail}')"></div>
          <div class="article-body">
            <span class="article-badge">${item.category || "Bài viết"}</span>
            <div class="article-meta">${item.author} • ${item.unit || ""} • ${formatVietnameseDate(item.date)}</div>
            <h3>${item.title}</h3>
            <p>${item.excerpt}</p>
            <a href="bai-viet.html?id=${item.id}" class="btn-gold">Xem chi tiết</a>
          </div>
        </article>
      `).join("");
    }

    function renderPagination() {
      const totalPages = Math.ceil(pageState.filtered.length / pageState.perPage);
      const box = document.getElementById("pagination");

      if (totalPages <= 1) {
        box.innerHTML = "";
        return;
      }

      let html = "";
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="${i === pageState.currentPage ? "active" : ""}" onclick="goToPage(${i})">${i}</button>`;
      }
      box.innerHTML = html;
    }

    function goToPage(page) {
      pageState.currentPage = page;
      renderArticles();
      renderPagination();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    document.addEventListener("DOMContentLoaded", function () {
      buildCategoryOptions();
      pageState.filtered = getSortValue(pageState.all, "newest");
      renderArticles();
      renderPagination();

      document.getElementById("searchInput").addEventListener("input", applyFilters);
      document.getElementById("categoryFilter").addEventListener("change", applyFilters);
      document.getElementById("sortFilter").addEventListener("change", applyFilters);
    });
  </script>
</body>
</html>
