<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --green-900: #0f3f38;
    --green-800: #145046;
    --green-700: #1d6a5c;
    --green-100: #eefaf5;

    --gold-700: #c9851f;
    --gold-600: #d8972f;
    --gold-100: #fff4de;

    --blue-100: #eef6ff;
    --mint-100: #edf9f3;
    --rose-100: #fff0ee;
    --violet-100: #f4efff;
    --amber-100: #fff7e8;

    --text-main: #17332d;
    --text-soft: #647a73;
    --white: #ffffff;

    --shadow-sm: 0 10px 24px rgba(16, 55, 47, 0.08);
    --shadow-md: 0 16px 34px rgba(16, 55, 47, 0.12);
    --shadow-lg: 0 24px 50px rgba(16, 55, 47, 0.18);

    --radius-xl: 28px;
    --radius-lg: 22px;
    --radius-md: 16px;
  }

  body {
    font-family: 'Inter', 'Segoe UI', 'Poppins', system-ui, sans-serif;
    color: var(--text-main);
    line-height: 1.6;
    overflow-x: hidden;
    background:
      radial-gradient(circle at top left, #fff7ea 0%, #fffdfa 35%, #f7fffb 100%);
  }

  .container {
    max-width: 1320px;
    margin: 0 auto;
    padding: 0 32px;
  }

  /* ===== HEADER TOP ===== */
  .top-header {
    background:
      radial-gradient(circle at 10% 20%, rgba(255, 206, 112, 0.12), transparent 20%),
      linear-gradient(135deg, #0f4038 0%, #145046 40%, #1d6a5c 100%);
    padding: 20px 0 0;
  }

  .banner-wrapper {
    max-width: 1320px;
    margin: 0 auto;
    padding: 0 32px;
  }

  .banner-container {
    position: relative;
    height: 250px;
    border-radius: 30px 30px 0 0;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    background:
      linear-gradient(120deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
      #103e37;
  }

  .banner-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    transform: scale(1.01);
  }

  .banner-overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, rgba(9, 39, 33, 0.7) 0%, rgba(9, 39, 33, 0.38) 38%, rgba(9, 39, 33, 0.12) 100%);
  }

  .banner-glow {
    position: absolute;
    width: 340px;
    height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,215,130,0.22), transparent 70%);
    top: -80px;
    left: -60px;
    pointer-events: none;
  }

  .logo-overlay {
    position: absolute;
    top: 24px;
    left: 24px;
    z-index: 5;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 22px;
    border-radius: 18px;
    background: rgba(255,255,255,0.95);
    border: 1px solid rgba(255,255,255,0.55);
    box-shadow: var(--shadow-md);
    backdrop-filter: blur(8px);
  }

  .logo-overlay img {
    height: 58px;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 0 10px rgba(255, 205, 108, 0.45));
  }

  .logo-text strong {
    display: block;
    font-size: 1.1rem;
    font-weight: 900;
    color: var(--green-800);
    line-height: 1.2;
  }

  .logo-text span {
    display: block;
    font-size: 0.84rem;
    color: #9a6d1f;
    font-weight: 700;
    margin-top: 2px;
  }

  .banner-title {
    position: absolute;
    left: 28px;
    bottom: 28px;
    z-index: 5;
    color: white;
    max-width: 620px;
  }

  .banner-title .mini-line {
    display: inline-block;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.18);
    font-size: 0.78rem;
    font-weight: 800;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }

  .banner-title h1 {
    font-size: clamp(1.9rem, 4vw, 3.1rem);
    line-height: 1.12;
    font-weight: 900;
    letter-spacing: -0.8px;
    text-shadow: 0 3px 12px rgba(0,0,0,0.25);
  }

  .banner-title p {
    margin-top: 12px;
    font-size: 1rem;
    color: rgba(255,255,255,0.92);
    max-width: 540px;
  }

  /* ===== NAV ===== */
  .nav-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(90deg, #c47b17, #d99832);
    box-shadow: 0 10px 24px rgba(0,0,0,0.12);
  }

  .nav-container {
    max-width: 1320px;
    margin: 0 auto;
    padding: 0 32px;
  }

  .nav-menu {
    display: flex;
    justify-content: center;
    gap: 36px;
    padding: 15px 0;
    flex-wrap: wrap;
  }

  .nav-menu a {
    text-decoration: none;
    color: white;
    font-size: 0.95rem;
    font-weight: 800;
    padding: 6px 4px;
    letter-spacing: 0.3px;
    position: relative;
    transition: 0.25s ease;
  }

  .nav-menu a::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -3px;
    width: 0;
    height: 3px;
    border-radius: 99px;
    transform: translateX(-50%);
    background: #fff3cb;
    transition: 0.25s ease;
  }

  .nav-menu a:hover::after {
    width: 80%;
  }

  .nav-menu a:hover {
    color: #fff8de;
  }

  /* ===== HERO ===== */
  .anniversary-section {
    position: relative;
    overflow: hidden;
    padding: 64px 0 54px;
    background:
      radial-gradient(circle at right top, rgba(255, 224, 164, 0.28), transparent 22%),
      radial-gradient(circle at left bottom, rgba(31, 106, 92, 0.09), transparent 22%),
      linear-gradient(135deg, #fffaf0 0%, #f8fffb 100%);
  }

  .hero-layout {
    display: grid;
    grid-template-columns: minmax(0, 1.35fr) minmax(300px, 0.72fr);
    gap: 34px;
    align-items: center;
  }

  .anniversary-badge {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 11px 20px;
    border-radius: 999px;
    background: linear-gradient(135deg, #fff7ea, #ffffff);
    border: 1px solid #f1dfbc;
    box-shadow: var(--shadow-sm);
    margin-bottom: 22px;
  }

  .anniversary-badge .year-label {
    font-size: 0.82rem;
    font-weight: 900;
    color: var(--gold-700);
    letter-spacing: 1px;
  }

  .anniversary-badge .year-number {
    font-size: 1.05rem;
    font-weight: 900;
    color: var(--green-800);
  }

  .main-title h2 {
    font-size: clamp(2.6rem, 5vw, 4.4rem);
    line-height: 1.08;
    font-weight: 900;
    letter-spacing: -1.5px;
    color: var(--green-800);
    margin-bottom: 8px;
  }

  .main-title h2 span {
    display: block;
    color: var(--gold-700);
    font-size: 0.76em;
    margin-top: 8px;
  }

  .slogan {
    display: inline-block;
    margin-top: 18px;
    padding: 14px 20px;
    border-radius: 18px;
    background: rgba(255,255,255,0.9);
    border: 1px solid #efe2cb;
    box-shadow: var(--shadow-sm);
    font-size: 1rem;
    color: var(--text-soft);
    font-style: italic;
  }

  .action-buttons {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin: 28px 0 26px;
  }

  .btn-action {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 13px 22px;
    border-radius: 16px;
    text-decoration: none;
    font-size: 0.94rem;
    font-weight: 800;
    transition: 0.25s ease;
    background: rgba(255,255,255,0.92);
    color: var(--green-800);
    border: 1px solid #ecdab9;
    box-shadow: var(--shadow-sm);
  }

  .btn-action:hover {
    transform: translateY(-3px);
  }

  .btn-primary-action {
    background: linear-gradient(135deg, #c47b17, #da9a35);
    color: white;
    border-color: transparent;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  .stat-block {
    background: rgba(255,255,255,0.92);
    border: 1px solid #efe4d1;
    border-radius: 22px;
    padding: 18px 14px;
    text-align: center;
    box-shadow: var(--shadow-sm);
  }

  .stat-number {
    font-size: 1.9rem;
    line-height: 1;
    font-weight: 900;
    color: var(--gold-700);
  }

  .stat-label {
    margin-top: 8px;
    font-size: 0.83rem;
    color: var(--text-soft);
    font-weight: 700;
  }

  .hero-side-box {
    position: relative;
    overflow: hidden;
    min-height: 380px;
    border-radius: 30px;
    padding: 28px;
    color: white;
    background:
      linear-gradient(145deg, #145046 0%, #1c6a5c 55%, #2b8b7a 100%);
    box-shadow: 0 20px 45px rgba(21, 89, 76, 0.22);
  }

  .hero-side-box::before {
    content: "";
    position: absolute;
    top: -40px;
    right: -40px;
    width: 180px;
    height: 180px;
    border-radius: 28px;
    background: rgba(255,255,255,0.09);
    transform: rotate(15deg);
  }

  .hero-side-box::after {
    content: "";
    position: absolute;
    left: -35px;
    bottom: -35px;
    width: 140px;
    height: 140px;
    border-radius: 24px;
    background: rgba(255,215,140,0.15);
    transform: rotate(-18deg);
  }

  .hero-side-label {
    position: relative;
    z-index: 1;
    display: inline-block;
    padding: 8px 16px;
    border-radius: 999px;
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.2);
    font-size: 0.78rem;
    font-weight: 900;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  .hero-side-box h3 {
    position: relative;
    z-index: 1;
    font-size: 1.8rem;
    line-height: 1.25;
    font-weight: 900;
    margin-bottom: 14px;
  }

  .hero-side-box p {
    position: relative;
    z-index: 1;
    font-size: 0.98rem;
    color: rgba(255,255,255,0.9);
  }

  .value-list {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 26px;
  }

  .value-item {
    padding: 14px 12px;
    text-align: center;
    border-radius: 18px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.18);
    font-weight: 800;
    backdrop-filter: blur(4px);
  }

  /* ===== SECTION CHUNG ===== */
  .section {
    padding: 82px 0;
    opacity: 0;
    transform: translateY(28px);
    transition: 0.7s ease;
  }

  .section.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .section-history { background: linear-gradient(135deg, #fff7ea 0%, #fffdf8 100%); }
  .section-activity { background: linear-gradient(135deg, #effaf4 0%, #fbfffd 100%); }
  .section-leaders { background: linear-gradient(135deg, #eef5ff 0%, #fbfdff 100%); }
  .section-posts { background: linear-gradient(135deg, #fff1ee 0%, #fffaf9 100%); }
  .section-games { background: linear-gradient(135deg, #f5efff 0%, #fcfbff 100%); }
  .section-gallery { background: linear-gradient(135deg, #fff5e7 0%, #fffdfa 100%); }

  .section-header {
    text-align: center;
    max-width: 820px;
    margin: 0 auto 46px;
  }

  .section-tag {
    display: inline-block;
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 0.72rem; /* nhỏ hơn nội dung chính nhưng nổi hơn */
    font-weight: 900;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    margin-bottom: 14px;
    box-shadow: var(--shadow-sm);
  }

  .tag-history { background: #ffe7bf; color: #b06d10; }
  .tag-activity { background: #daf4e7; color: #15674f; }
  .tag-leaders { background: #dceaff; color: #2f5ca3; }
  .tag-posts { background: #ffdcd5; color: #b55231; }
  .tag-games { background: #e7dbff; color: #7343b4; }
  .tag-gallery { background: #ffe8c7; color: #b87618; }

  .section-header h2 {
    font-size: clamp(2rem, 3.5vw, 2.9rem);
    line-height: 1.2;
    font-weight: 900;
    color: var(--green-800);
    margin-bottom: 10px;
  }

  .section-header p {
    font-size: 1rem;
    color: var(--text-soft);
  }

  /* timeline */
  .timeline {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 22px;
  }

  .timeline-card {
    background: rgba(255,255,255,0.94);
    border-radius: 26px;
    padding: 26px 18px;
    text-align: center;
    border: 1px solid #f0dfbf;
    box-shadow: var(--shadow-sm);
    transition: 0.28s ease;
    position: relative;
    overflow: hidden;
  }

  .timeline-card::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 6px;
    background: linear-gradient(90deg, #c47b17, #e4b25c);
  }

  .timeline-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow-md);
  }

  .year {
    font-size: 1.7rem;
    font-weight: 900;
    color: var(--gold-700);
    margin-bottom: 10px;
  }

  .timeline-card p {
    font-size: 0.95rem;
    color: var(--text-soft);
    font-weight: 700;
  }

  /* content grid */
  .content-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
  }

  .content-card {
    border-radius: 28px;
    padding: 30px 22px;
    text-align: center;
    box-shadow: var(--shadow-sm);
    transition: 0.28s ease;
    border: 1px solid rgba(0,0,0,0.04);
  }

  .content-card:nth-child(1) { background: linear-gradient(135deg, #fff3d9, #fffdf5); }
  .content-card:nth-child(2) { background: linear-gradient(135deg, #e8f8f0, #fbfffd); }
  .content-card:nth-child(3) { background: linear-gradient(135deg, #edf5ff, #fcfdff); }
  .content-card:nth-child(4) { background: linear-gradient(135deg, #fff0ea, #fffaf7); }

  .content-card:hover {
    transform: translateY(-8px);
    box-shadow: var(--shadow-md);
  }

  .card-icon {
    width: 74px;
    height: 74px;
    margin: 0 auto 16px;
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    background: rgba(255,255,255,0.75);
  }

  .content-card h3 {
    font-size: 1.18rem;
    font-weight: 900;
    color: var(--green-800);
    margin-bottom: 10px;
  }

  .content-card p {
    font-size: 0.95rem;
    color: var(--text-soft);
    font-weight: 600;
  }

  /* special cards */
  .special-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 28px;
  }

  .special-card {
    background: rgba(255,255,255,0.94);
    border-radius: 30px;
    padding: 34px 30px;
    box-shadow: var(--shadow-sm);
    border: 1px solid rgba(0,0,0,0.05);
    transition: 0.28s ease;
  }

  .special-card:hover {
    transform: translateY(-8px);
    box-shadow: var(--shadow-md);
  }

  .special-icon {
    width: 72px;
    height: 72px;
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #fff0d5, #fff8eb);
  }

  .special-card h3 {
    font-size: 1.28rem;
    font-weight: 900;
    color: var(--green-800);
    margin-bottom: 10px;
  }

  .special-card p {
    color: var(--text-soft);
    font-size: 0.96rem;
  }

  .btn-special {
    display: inline-block;
    margin-top: 20px;
    padding: 11px 20px;
    border-radius: 16px;
    background: linear-gradient(135deg, #c47b17, #db9a34);
    color: white;
    text-decoration: none;
    font-weight: 800;
    font-size: 0.9rem;
    box-shadow: 0 10px 22px rgba(196,123,23,0.2);
  }

  /* leaders */
  .leader-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
  }

  .leader-card {
    background: rgba(255,255,255,0.94);
    border-radius: 26px;
    padding: 22px 16px;
    text-align: center;
    box-shadow: var(--shadow-sm);
    transition: 0.28s ease;
  }

  .leader-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow-md);
  }

  .leader-avatar {
    width: 86px;
    height: 86px;
    margin: 0 auto 14px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    background: linear-gradient(135deg, #deebff, #eff5ff);
    color: #305da2;
  }

  .leader-card h4 {
    font-size: 1rem;
    font-weight: 900;
    color: var(--green-800);
    margin-bottom: 6px;
  }

  .leader-card p {
    color: var(--text-soft);
    font-size: 0.9rem;
    font-weight: 700;
  }

  /* gallery */
  .gallery {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 22px;
  }

  .gallery-card {
    background: rgba(255,255,255,0.96);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: 0.28s ease;
  }

  .gallery-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow-md);
  }

  .gallery-img {
    height: 190px;
    background-size: cover;
    background-position: center;
  }

  .gallery-caption {
    padding: 14px;
    text-align: center;
    font-size: 0.92rem;
    color: var(--text-soft);
    font-weight: 700;
  }

  .img1 { background: url('https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&w=800&q=80') center/cover; }
  .img2 { background: url('https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=800&q=80') center/cover; }
  .img3 { background: url('https://images.unsplash.com/photo-1557804506-669a67965ba0?auto=format&fit=crop&w=800&q=80') center/cover; }
  .img4 { background: url('https://images.unsplash.com/photo-1516321497487-e288fb19713f?auto=format&fit=crop&w=800&q=80') center/cover; }

  /* footer */
  footer {
    background: linear-gradient(135deg, #103f38 0%, #165348 100%);
    color: #eef7f4;
    padding: 56px 0 20px;
  }

  .footer-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1.2fr;
    gap: 40px;
  }

  .footer-logo img {
    width: 72px;
    margin-bottom: 14px;
  }

  .footer-links h4 {
    color: #ffd88d;
    margin-bottom: 16px;
    font-weight: 800;
  }

  .footer-links p,
  .footer-logo p {
    font-size: 0.9rem;
    opacity: 0.92;
    margin-bottom: 8px;
  }

  .social-links {
    display: flex;
    gap: 14px;
    margin-top: 18px;
  }

  .social-links a {
    width: 40px;
    height: 40px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    color: white;
    text-decoration: none;
    transition: 0.2s;
  }

  .social-links a:hover {
    background: #d8972f;
    transform: translateY(-2px);
  }

  .copyright {
    text-align: center;
    padding-top: 24px;
    margin-top: 34px;
    border-top: 1px solid rgba(255,255,255,0.14);
    font-size: 0.8rem;
    opacity: 0.85;
  }

  @media (max-width: 1100px) {
    .hero-layout,
    .special-grid {
      grid-template-columns: 1fr;
    }

    .content-grid,
    .timeline {
      grid-template-columns: repeat(2, 1fr);
    }

    .leader-grid {
      grid-template-columns: repeat(3, 1fr);
    }

    .gallery,
    .footer-grid {
      grid-template-columns: repeat(2, 1fr);
    }

    .stats-row {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 768px) {
    .container,
    .banner-wrapper,
    .nav-container {
      padding: 0 18px;
    }

    .banner-container {
      height: 200px;
      border-radius: 22px 22px 0 0;
    }

    .logo-overlay {
      top: 12px;
      left: 12px;
      padding: 10px 14px;
    }

    .logo-overlay img {
      height: 42px;
    }

    .banner-title {
      left: 16px;
      right: 16px;
      bottom: 16px;
    }

    .banner-title h1 {
      font-size: 1.55rem;
    }

    .nav-menu {
      gap: 18px;
    }

    .nav-menu a {
      font-size: 0.84rem;
    }

    .content-grid,
    .timeline,
    .gallery,
    .footer-grid {
      grid-template-columns: 1fr;
    }

    .leader-grid {
      grid-template-columns: repeat(2, 1fr);
    }

    .stats-row {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 520px) {
